name: Get Citation Data

on:
  workflow_dispatch:        # allow manual "Run workflow" refresh
  page_build:               # refresh when the site is (re)deployed
  schedule:
    - cron: '0 8 * * *'     # daily at 08:00 UTC

permissions:
  contents: write

# Avoid overlapping runs racing on the google-scholar-stats branch.
concurrency:
  group: scholar-citations
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: google_scholar_crawler/requirements.txt

      - name: Install dependencies
        run: pip install -r google_scholar_crawler/requirements.txt

      - name: Fetch citation data
        working-directory: ./google_scholar_crawler
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python3 main.py

      - name: Publish to google-scholar-stats branch
        working-directory: ./google_scholar_crawler/results
        run: |
          if [ ! -f gs_data.json ]; then
            echo "No new data fetched this run; keeping previously published data."
            exit 0
          fi
          git init -q
          git config --local user.name "${GITHUB_ACTOR}"
          git config --local user.email "yupengsu06@gmail.com"
          git add *.json
          git commit -q -m "Updated Citation Data"
          git push --force \
            "https://${GITHUB_ACTOR}:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" \
            HEAD:google-scholar-stats
